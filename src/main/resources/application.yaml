# 应用服务 WEB 访问端口
server:
  port: 8080
spring:
  application:
    name: reggie_take_out
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/reggie?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
reggie:
  path: D:\
  default-password: "123456"  # 初始密码，建议通过环境变量覆盖
  upload:
    allowed-extensions: .jpg,.jpeg,.png,.gif,.pdf,.doc,.docx  # 允许上传的文件扩展名
    max-size: 10485760  # 最大文件大小10MB
  security:
    white-list: /employee/login,/employee/logout,/common/**  # 登录白名单

